<!DOCTYPE html>
<html lang="en">

<head>
    <title>{{ page.title }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="icon" href="/assets/icon.png" type="image/png">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <link rel="stylesheet" href="/assets/css/search.css">
    <link rel="stylesheet" href="/assets/css/lightbar.css">
    <link rel="stylesheet" href="/assets/css/subpages.css">
    <link rel="stylesheet" href="/assets/css/cs2.css">
    <link rel="stylesheet" href="/assets/css/arc-raiders.css">
</head>

<body>
    <div class="absolute inset-x-0 top-0 flex h-[88px] items-center justify-center" style="top:0px">
        <div class="absolute inset-x-0 -mt-[22%] flex items-center sm:mt-0">
            <div class="absolute inset-0 w-full h-[680px] overflow-hidden pointer-events-none -mt-64">
                <div class="max-w-screen w-full h-[680px] relative pt-64">
                    <div class="lightbar">
                        <div class="lightbar-visual"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    {{ content }}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
        </script>
    <script>
        (function () {
            function attachCursorGlow(el, opts) {
                const leaveDelay = (opts && opts.leaveDelay) || 420;
                let leaveTimer;
                function update(e) {
                    const r = el.getBoundingClientRect();
                    const x = ((e.clientX - r.left) / r.width) * 100;
                    const y = ((e.clientY - r.top) / r.height) * 100;
                    el.style.setProperty('--mx', x.toFixed(2) + '%');
                    el.style.setProperty('--my', y.toFixed(2) + '%');
                }
                el.addEventListener('mousemove', update);
                el.addEventListener('mouseenter', (e) => {
                    el.classList.remove('glow-leave');
                    update(e);
                });
                el.addEventListener('mouseleave', () => {
                    el.classList.add('glow-leave');
                    if (leaveTimer) clearTimeout(leaveTimer);
                    leaveTimer = setTimeout(() => el.classList.remove('glow-leave'), leaveDelay);
                });
            }
            const search = document.querySelector('.google-search');
            if (search) attachCursorGlow(search, { leaveDelay: 420 });
            document.querySelectorAll('.card').forEach((el) => attachCursorGlow(el, { leaveDelay: 420 }));
        })();

        document.querySelectorAll('.section-title').forEach((el) => {
            el.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        });

        document.querySelectorAll('.cmd').forEach((el) => {
            el.addEventListener('click', () => {
                const cmd = el.dataset.cmd;
                navigator.clipboard.writeText(cmd).then(() => {
                    el.classList.add('cmd--copied');
                    setTimeout(() => el.classList.remove('cmd--copied'), 1200);
                });
            });
        });
    </script>
</body>

</html>
